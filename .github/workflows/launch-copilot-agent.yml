name: Launch Copilot Agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to assign to Copilot (e.g. 1)"
        required: true
        type: number
      base_branch:
        description: "Base branch for Copilot to branch from. Defaults to main."
        required: false
        default: "main"
        type: string
      custom_instructions:
        description: "Extra instructions to post as a comment before assigning."
        required: false
        default: ""
        type: string

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  launch-copilot:
    name: Assign Issue #${{ inputs.issue_number }} to GitHub Copilot
    runs-on: ubuntu-latest

    steps:
      # ── 1. Validate inputs ──────────────────────────────────────────────────
      - name: Validate inputs
        run: |
          echo "✅ Input validation"
          echo "  issue_number : ${{ inputs.issue_number }}"
          echo "  base_branch  : ${{ inputs.base_branch || 'main' }}"
          if [ -z "${{ inputs.issue_number }}" ]; then
            echo "❌ issue_number is required"
            exit 1
          fi

      # ── 2. Verify PAT secret + diagnose token type ──────────────────────────
      - name: Verify PAT and diagnose token type
        env:
          PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "❌ COPILOT_ASSIGN_PAT is not set."
            echo ""
            echo "Create a CLASSIC PAT at https://github.com/settings/tokens"
            echo "Required scopes: repo (full)"
            echo "Store it as repository secret: COPILOT_ASSIGN_PAT"
            exit 1
          fi

          # Diagnose token type without printing the token value
          PREFIX=$(echo "$PAT" | cut -c1-4)
          echo "Token prefix (first 4 chars): $PREFIX"
          if [ "$PREFIX" = "ghp_" ]; then
            echo "✅ Token type: Classic PAT (ghp_) — recommended for Copilot assignment"
          elif [ "$PREFIX" = "gith" ]; then
            echo "⚠️  Token type: Fine-grained PAT (github_pat_...) — may lack Copilot scope"
            echo "   If assignment fails with 403/FORBIDDEN, switch to a classic PAT with 'repo' scope"
          elif [ "$PREFIX" = "ghs_" ]; then
            echo "❌ Token type: GITHUB_TOKEN (ghs_) — will NOT work for Copilot assignment"
            echo "   GitHub requires a PAT, not a GITHUB_TOKEN, for Copilot bot assignment"
            exit 1
          else
            echo "ℹ️  Token type: Unknown prefix ($PREFIX)"
          fi

          # Verify the token works at all
          HTTP=$(curl -s -o /tmp/user.json -w "%{http_code}" \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/user)
          if [ "$HTTP" = "200" ]; then
            LOGIN=$(python3 -c "import json; print(json.load(open('/tmp/user.json')).get('login','?'))")
            echo "✅ PAT is valid — authenticated as: $LOGIN"
          else
            echo "❌ PAT authentication failed (HTTP $HTTP)"
            exit 1
          fi

      # ── 3. Verify issue exists ──────────────────────────────────────────────
      - name: Verify issue exists
        env:
          PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
        run: |
          HTTP=$(curl -s -o /tmp/issue.json -w "%{http_code}" \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ inputs.issue_number }}")

          if [ "$HTTP" != "200" ]; then
            echo "❌ Issue #${{ inputs.issue_number }} not found (HTTP $HTTP)"
            cat /tmp/issue.json
            exit 1
          fi

          TITLE=$(python3 -c "import json; print(json.load(open('/tmp/issue.json'))['title'])")
          STATE=$(python3 -c "import json; print(json.load(open('/tmp/issue.json'))['state'])")
          echo "✅ Issue found: #${{ inputs.issue_number }} — $TITLE (state: $STATE)"

          if [ "$STATE" != "open" ]; then
            echo "⚠️  Issue is not open — Copilot may not start"
          fi

      # ── 4. Post custom instructions comment (if provided) ──────────────────
      - name: Post custom instructions comment
        if: inputs.custom_instructions != ''
        env:
          PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
        run: |
          BODY=$(python3 -c "
          import json
          body = '## 🤖 Copilot Instructions\n\n${{ inputs.custom_instructions }}'
          print(json.dumps({'body': body}))
          ")

          HTTP=$(curl -s -o /tmp/comment.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/comments")

          if [ "$HTTP" = "201" ]; then
            URL=$(python3 -c "import json; print(json.load(open('/tmp/comment.json')).get('html_url','?'))")
            echo "✅ Comment posted: $URL"
          else
            echo "⚠️  Comment failed (HTTP $HTTP) — non-fatal, continuing"
          fi

      # ── 5. Assign issue to Copilot via REST agent_assignment ────────────────
      #
      # This uses the official REST endpoint with the agent_assignment payload.
      # Reference: https://github.blog/changelog/2025-12-03-assign-issues-to-copilot-using-the-api/
      #
      # Key facts:
      #   - assignees must be ["copilot-swe-agent[bot]"]
      #   - agent_assignment.target_repo tells Copilot which repo to work in
      #   - agent_assignment.base_branch tells Copilot which branch to start from
      #   - A classic PAT with 'repo' scope is required
      #   - Fine-grained PATs need: Issues+PR+Contents+Actions (write)
      # ────────────────────────────────────────────────────────────────────────
      - name: Assign issue to Copilot via REST agent_assignment
        id: assign
        env:
          PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
        run: |
          BASE_BRANCH="${{ inputs.base_branch }}"
          if [ -z "$BASE_BRANCH" ]; then
            BASE_BRANCH="main"
          fi

          PAYLOAD=$(python3 -c "
          import json
          payload = {
            'assignees': ['copilot-swe-agent[bot]'],
            'agent_assignment': {
              'target_repo': '${{ github.repository }}',
              'base_branch': '$BASE_BRANCH',
              'custom_instructions': '',
              'custom_agent': ''
            }
          }
          print(json.dumps(payload))
          ")

          echo "Sending agent_assignment payload to REST API..."
          echo "  endpoint: POST /repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/assignees"
          echo "  assignee: copilot-swe-agent[bot]"
          echo "  target_repo: ${{ github.repository }}"
          echo "  base_branch: $BASE_BRANCH"

          HTTP=$(curl -s -o /tmp/assign_response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ inputs.issue_number }}/assignees")

          echo "HTTP response: $HTTP"

          if [ "$HTTP" = "201" ]; then
            ASSIGNEES=$(python3 -c "
          import json
          d = json.load(open('/tmp/assign_response.json'))
          names = [a['login'] for a in d.get('assignees', [])]
          print(', '.join(names) if names else 'none')
            ")
            echo "✅ Assignment succeeded!"
            echo "   Assignees: $ASSIGNEES"
          else
            echo "❌ Assignment failed (HTTP $HTTP)"
            echo "--- Response body ---"
            cat /tmp/assign_response.json
            echo ""
            echo "--- Troubleshooting guide ---"
            echo "HTTP 403 / 'Resource not accessible by personal access token':"
            echo "  → Your COPILOT_ASSIGN_PAT is a fine-grained PAT with insufficient scope"
            echo "  → Fix: create a CLASSIC PAT at https://github.com/settings/tokens"
            echo "         Required scope: repo (full)"
            echo "         Store as repo secret: COPILOT_ASSIGN_PAT"
            echo ""
            echo "HTTP 422 / 'invalid assignees':"
            echo "  → Copilot cloud agent is not enabled on this repo or account"
            echo "  → Fix: go to Settings > Copilot > Coding agent and enable it"
            echo ""
            echo "HTTP 401:"
            echo "  → PAT is expired or revoked — regenerate it"
            exit 1
          fi

      # ── 6. Verify assignment + check for Copilot PR ─────────────────────────
      - name: Verify assignment and check for Copilot PR
        env:
          PAT: ${{ secrets.COPILOT_ASSIGN_PAT }}
        run: |
          sleep 5  # brief pause for assignment to propagate

          # Check issue assignees
          ISSUE=$(curl -s \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ inputs.issue_number }}")

          ASSIGNEES=$(python3 -c "
          import json, sys
          d = json.loads('''$ISSUE'''.replace(\"'''\", ''))
          " 2>/dev/null || echo "parse error")

          ASSIGNEES=$(echo "$ISSUE" | python3 -c "
          import sys, json
          d = json.loads(sys.stdin.read())
          names = [a['login'] for a in d.get('assignees', [])]
          print(', '.join(names) if names else 'none')
          ")
          echo "✅ Issue #${{ inputs.issue_number }} current assignees: $ASSIGNEES"

          # Check for any open PRs from Copilot
          PRS=$(curl -s \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&per_page=20")

          COPILOT_PRS=$(echo "$PRS" | python3 -c "
          import sys, json
          prs = json.loads(sys.stdin.read())
          found = [pr['html_url'] for pr in prs if 'copilot' in pr.get('user', {}).get('login', '').lower()]
          if found:
              print('Copilot PRs found:')
              for url in found:
                  print('  ' + url)
          else:
              print('No Copilot PRs yet (Copilot may still be starting — check GitHub in 5-10 min)')
          ")
          echo "$COPILOT_PRS"
